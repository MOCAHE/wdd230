<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/wdd230/lesson5/css/bom.css">
    <title>Favorite books</title>
  </head>

  <body>
    <h1>📖 Book of Mormon - Top 10</h1>
    <main>
        <div class="input">
            <label>Enter Book and Chapter<br>
                <input type="text" id="favchap" placeholder="Alma 5" required></label>
            <button type="submit">Add Chapter</button>
        </div>
        
        <div class="listcontainer">
            <ul class="list"></ul>
        </div>

        <script src="/wdd230/lesson5/js/bom.js"></script>

    </main>
  </body>

</html>
